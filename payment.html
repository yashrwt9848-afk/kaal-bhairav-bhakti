<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kaal Bhairav Premium</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h1>🔱 Kaal Bhairav Premium</h1>

  <button onclick="openRazorpay('trial')">₹1 Trial (3 Days)</button>
  <br><br>
  <button onclick="openRazorpay('full')">Buy Premium ₹199 (7 Days)</button>

<script>
// ======================
// CHECK PREMIUM (AUTO REDIRECT)
// ======================
(function(){
    let isPremium = localStorage.getItem("isPremium");
    let premiumExpiry = localStorage.getItem("premiumExpiry");

    if(isPremium === "true" && premiumExpiry && Date.now() < parseInt(premiumExpiry)) {
        window.location.href = "premium.html";
    }
})();

// ======================
// PAYMENT FUNCTION
// ======================
function openRazorpay(planType) {

    let amount = planType === "trial" ? 100 : 19900;

    let options = {
        key: "rzp_live_SUKvoNdYYcy1TK",
        amount: amount,
        currency: "INR",
        name: "Kaal Bhairav Premium",
        description: planType === "trial" ? "₹1 Trial - 3 Days" : "Premium - 7 Days",

        handler: function(response){

            localStorage.setItem("isPremium", "true");

            let expiry;

            if(planType === "trial") {
                expiry = Date.now() + 3*24*60*60*1000;
            } else {
                expiry = Date.now() + 7*24*60*60*1000;
            }

            localStorage.setItem("premiumExpiry", expiry);

            alert("✅ Payment Successful 🔱");
            window.location.href = "premium.html";
        },

        theme: { color: "#ff0000" },

        modal: {
            ondismiss: function(){
                alert("❌ Payment Cancelled");
            }
        }
    };

    let rzp = new Razorpay(options);
    rzp.open();
}
</script>

</body>
</html>
