<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Content</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h1>🔱 Premium Bhakti Videos</h1>

<button onclick="logout()">Logout</button>

<br><br>

<video width="300" controls>
  <source src="your-video.mp4" type="video/mp4">
</video>

<script>
// ======================
// CHECK PREMIUM ACCESS
// ======================
function checkPremium() {
    let isPremium = localStorage.getItem("isPremium");
    let premiumExpiry = localStorage.getItem("premiumExpiry");

    if(isPremium === "true" && premiumExpiry && Date.now() < parseInt(premiumExpiry)) {
        return true;
    }

    localStorage.removeItem("isPremium");
    localStorage.removeItem("premiumExpiry");

    alert("⚠️ Pehle Premium lo!");
    window.location.href = "index.html";
    return false;
}

// Run check on load
checkPremium();

// ======================
// LOGOUT
// ======================
function logout() {
    localStorage.removeItem("isPremium");
    localStorage.removeItem("premiumExpiry");
    alert("Logged out!");
    window.location.href = "index.html";
}
</script>

</body>
</html>
